exclude: 'node_modules|.git'
default_stages: [pre-commit]
fail_fast: false


repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        files: "template.*"
        exclude: ".*json$|.*txt$|.*csv|.*md|.*svg"
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.1
    hooks:
      - id: ruff
        name: "Run ruff import sorter"
        args: ["--select=I", "--fix"]

      - id: ruff
        name: "Run ruff linter"

      - id: ruff-format
        name: "Run ruff formatter"

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.7.1
    hooks:
      - id: prettier
        types_or: [javascript, vue, scss]
        # Ignore any files that might contain jinja / bundles
        exclude: |
            (?x)^(
                template/public/dist/.*|
                .*node_modules.*|
                .*boilerplate.*|
                template/templates/includes/.*|
                template/public/js/lib/.*
            )$


  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.44.0
    hooks:
      - id: eslint
        types_or: [javascript]
        args: ['--quiet']
        # Ignore any files that might contain jinja / bundles
        exclude: |
            (?x)^(
                template/public/dist/.*|
                cypress/.*|
                .*node_modules.*|
                .*boilerplate.*|
                template/templates/includes/.*|
                template/public/js/lib/.*|
                nce_events/public/js/panel_page_v2_dist/.*
            )$

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.350
    hooks:
      - id: pyright
        args: [--project, pyrightconfig.json]
        pass_filenames: false
        # Phase 10 typing pass — pyright runs in basic mode against
        # nce_events/api/ (tests are excluded via pyrightconfig.json and
        # will be revisited in Phase 11).
        files: |
            (?x)^(
                nce_events/api/.*\.py|
                pyrightconfig\.json
            )$

  - repo: local
    hooks:
      - id: build-code-index
        name: build-code-index (auto-generated CODE_INDEX.json must be in sync)
        entry: python3 scripts/build_code_index.py --check
        language: system
        pass_filenames: false
        # Run only when source files in scope, the manual overlay, or the
        # script itself change. Other commits do not need a check.
        files: |
            (?x)^(
                nce_events/.*\.py|
                nce_events/.*\.js|
                nce_events/.*\.vue|
                nce_events/nce_events/doctype/.*|
                nce_events/CODE_INDEX\.manual\.json|
                scripts/build_code_index\.py
            )$

ci:
    autoupdate_schedule: weekly
    skip: []
    submodules: false
